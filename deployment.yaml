apiVersion: apps/v1
kind: Deployment
metadata:
 name: employee-app

spec:
 replicas: 2

 selector:
   matchLabels:
     app: employee-app

 template:
   metadata:
     labels:
       app: employee-app

   spec:
     containers:
     - name: employee-app
       image: employee-app
       ports:
       - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
 name: employee-service

spec:
 type: NodePort

 selector:
   app: employee-app

 ports:
 - port: 8080
   targetPort: 8080
   nodePort: 30080

